<div id="Stylist">
	<div class="titlebar">
		<span>Stylist</span>
		<button class="btn-close" title="Close">&#x2715;</button>
	</div>
	<div class="content">
		<!-- Hair Style -->
		<div class="section">
			<div class="section-label">Hair Style</div>
			<div class="hair-style-row">
				<button class="btn-arrow btn-hair-prev">&#x25C4;</button>
				<div class="hair-style-value">1</div>
				<button class="btn-arrow btn-hair-next">&#x25BA;</button>
			</div>
		</div>
		<!-- Hair Color -->
		<div class="section">
			<div class="section-label">Hair Color</div>
			<div class="palette-row hair-palette">
				<div class="pal-swatch" data-pal="0"></div>
				<div class="pal-swatch" data-pal="1"></div>
				<div class="pal-swatch" data-pal="2"></div>
				<div class="pal-swatch" data-pal="3"></div>
				<div class="pal-swatch" data-pal="4"></div>
				<div class="pal-swatch" data-pal="5"></div>
				<div class="pal-swatch" data-pal="6"></div>
				<div class="pal-swatch" data-pal="7"></div>
				<div class="pal-swatch" data-pal="8"></div>
				<div class="pal-swatch" data-pal="9"></div>
			</div>
		</div>
		<!-- Body Color -->
		<div class="section">
			<div class="section-label">Body Color</div>
			<div class="palette-row body-palette">
				<div class="pal-swatch body-swatch" data-pal="0"></div>
				<div class="pal-swatch body-swatch" data-pal="1"></div>
				<div class="pal-swatch body-swatch" data-pal="2"></div>
				<div class="pal-swatch body-swatch" data-pal="3"></div>
				<div class="pal-swatch body-swatch" data-pal="4"></div>
				<div class="pal-swatch body-swatch" data-pal="5"></div>
				<div class="pal-swatch body-swatch" data-pal="6"></div>
				<div class="pal-swatch body-swatch" data-pal="7"></div>
				<div class="pal-swatch body-swatch" data-pal="8"></div>
				<div class="pal-swatch body-swatch" data-pal="9"></div>
			</div>
		</div>
	</div>
	<div class="footer">
		<button class="btn-confirm">Confirm</button>
		<button class="btn-cancel">Cancel</button>
	</div>
</div>
